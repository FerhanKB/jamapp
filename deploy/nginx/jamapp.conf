# jamapp reverse-proxy snippet for ifkb.dev.
#
# Drop this inside your existing `server { listen 443 ssl; server_name ifkb.dev; ... }`
# block, or adapt as needed. The map directive below must live in the http {} scope
# (usually in /etc/nginx/nginx.conf); if you already have it for other apps, skip it.
#
# Then: sudo nginx -t && sudo systemctl reload nginx

# ----- http {} scope (put once, globally) -----
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }

# ----- server {} scope for ifkb.dev -----
location /jamapp/ {
    proxy_pass http://127.0.0.1:8080/;   # trailing slash strips the /jamapp prefix
    proxy_http_version 1.1;

    # WebSocket upgrade (jam rooms + notifications)
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Preserve client info
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Long-lived WebSockets: keep connections open up to an hour.
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}
